<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Support Agent - Test UI</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f6f8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 420px;
      height: 650px;
      background: white;
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.12);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      background: #0176d3;
      color: white;
      padding: 14px;
      font-weight: bold;
      text-align: center;
    }

    .content {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: 20px;
      text-align: center;
    }

    .placeholder {
      font-size: 14px;
      color: #666;
      line-height: 1.5;
    }

    .badge {
      margin-top: 12px;
      font-size: 12px;
      background: #eef4ff;
      color: #1a56db;
      padding: 6px 10px;
      border-radius: 8px;
    }

    .footer {
      font-size: 12px;
      padding: 10px;
      border-top: 1px solid #eee;
      background: #fafafa;
      text-align: center;
      color: #888;
    }
  </style>
</head>

<body>

<div class="container">
  <div class="header">
    AI Support Agent Test
  </div>

  <div class="content">
    <div class="placeholder">
      Diese Seite ist vorbereitet für <b>Salesforce Enhanced Messaging</b>.
      <br><br>
      Der Chat wird später dynamisch eingebettet.
    </div>

    <div class="badge">
      UI Layer getrennt vom Messaging Layer
    </div>
  </div>

  <div class="footer">
    Testumgebung – kein aktiver Chat integriert
  </div>
</div>

<script type='text/javascript'>
      function initEmbeddedMessaging() {
            window.addEventListener("onEmbeddedMessagingReady", () => {
                  const currentUrl = window.location.href;

                  embeddedservice_bootstrap.prechatAPI.setHiddenPrechatFields({
                        CurrentPageUrl: currentUrl
                  });
            });

            try {
                  embeddedservice_bootstrap.settings.language = 'en_US';

                  embeddedservice_bootstrap.init(
                        '00D9V00000SLEUU',
                        'Kia_AI_Support_Agent_Test',
                        'https://kiauvocdp--agentforce.sandbox.my.site.com/ESWKiaAISupportAgentT1776944043291',
                        {
                              scrt2URL: 'https://kiauvocdp--agentforce.sandbox.my.salesforce-scrt.com'
                        }
                  );
            } catch (err) {
                  console.error('Error loading Embedded Messaging: ', err);
            }
      };
</script>
<script type='text/javascript' src='https://kiauvocdp--agentforce.sandbox.my.site.com/ESWKiaAISupportAgentT1776944043291/assets/js/bootstrap.min.js' onload='initEmbeddedMessaging()'></script>

</body>
</html>
